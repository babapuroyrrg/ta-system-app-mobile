services:
  - type: web
    name: ta-system-backend
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GEMINI_API_KEY
        sync: false
      - key: OAUTH_SERVER_URL
        value: https://ta-system-app-mobile.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_APP_ID
        value: ""
      - key: OWNER_OPEN_ID
        value: ""
      - key: BUILT_IN_FORGE_API_URL
        value: ""
      - key: BUILT_IN_FORGE_API_KEY
        value: ""
